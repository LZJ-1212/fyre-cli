<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCraft - Agentic Workflow IDE</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            gap: 20px;
        }

        h2,
        h3 {
            margin-top: 0;
            color: #cbd5e1;
        }

        /* 左側：控制面板 */
        .control-panel {
            flex: 1;
            background: var(--panel);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            overflow-y: auto;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #94a3b8;
        }

        input[type="text"],
        input[type="password"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            margin-top: 5px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .checkbox-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: #cbd5e1;
            font-weight: normal;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            filter: brightness(1.1);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        /* 右側：實時終端與對話區 */
        .workspace {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .terminal {
            flex: 1;
            background: #000;
            color: #00ff00;
            font-family: 'Consolas', monospace;
            padding: 15px;
            border-radius: 12px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 0.9rem;
            border: 1px solid #334155;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .chat-box {
            background: var(--panel);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
        }

        .chat-box input {
            flex: 1;
            margin: 0;
        }

        .chat-box button {
            background: #8b5cf6;
        }

        /* Reviewer Modal (QA 決策視窗) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--panel);
            padding: 25px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid #475569;
        }

        .modal h3 {
            color: #f59e0b;
            margin-bottom: 10px;
        }

        .modal p {
            color: #e2e8f0;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .option-btn {
            background: #334155;
            display: block;
            width: 100%;
            text-align: left;
            margin-bottom: 10px;
            border: 1px solid #475569;
            padding: 12px;
            color: white;
            transition: 0.2s;
        }

        .option-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* 動畫 */
        .pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="control-panel">
        <h2>🛠️ CodeCraft Setup</h2>

        <div>
            <label>Project Name (Optional)</label>
            <input type="text" id="outputDir" placeholder="e.g. my-awesome-app">
        </div>

        <div>
            <label>DeepSeek API Key</label>
            <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxx (Required)">
        </div>

        <div>
            <label>Project Description</label>
            <textarea id="description" placeholder="Describe your app in detail..."></textarea>
        </div>

        <div>
            <label>Output Language (English First)</label>
            <select id="lang">
                <option value="en">English (Professional Grade)</option>
                <option value="zh">繁體中文</option>
            </select>
        </div>

        <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" id="install" checked> Auto Install npm</label>
            <label class="checkbox-label"><input type="checkbox" id="test" checked> QA Self-Testing</label>
            <label class="checkbox-label"><input type="checkbox" id="force"> Force Overwrite</label>
        </div>

        <button id="generateBtn" onclick="generateProject()">🚀 Launch Agentic Workflow</button>
    </div>

    <div class="workspace">
        <div class="terminal" id="terminal">Welcome to CodeCraft Agentic Terminal. Ready to deploy.\n</div>

        <div class="chat-box">
            <input type="text" id="patchMsg" placeholder="AI Patch: Tell AI how to modify the current code..." disabled>
            <button id="patchBtn" onclick="sendPatch()" disabled>✨ Apply Patch</button>
        </div>
    </div>

    <div class="modal-overlay" id="reviewerModal">
        <div class="modal">
            <h3>⚠️ QA Agent Intervention Required</h3>
            <p id="reviewerMsg">The system encountered an unresolvable issue during testing.</p>
            <div id="reviewerOptions"></div>
            <button onclick="closeModal()" style="margin-top: 15px; background: #64748b;">Ignore & Continue</button>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const generateBtn = document.getElementById('generateBtn');
        const patchMsg = document.getElementById('patchMsg');
        const patchBtn = document.getElementById('patchBtn');

        // 終端機輸出小幫手
        function appendLog(text) {
            terminal.innerHTML += text.replace(/\n/g, '<br>').replace(/\[31m/g, '<span style="color:#ef4444;">').replace(/\[32m/g, '<span style="color:#10b981;">').replace(/\[33m/g, '<span style="color:#f59e0b;">').replace(/\[35m/g, '<span style="color:#d946ef;">').replace(/\[36m/g, '<span style="color:#06b6d4;">').replace(/\[0m/g, '</span>');
            terminal.scrollTop = terminal.scrollHeight;
        }

        // 解析資料流，並攔截秘密標籤
        async function readStream(response) {
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });

                // 攔截 QA Reviewer 秘密標籤
                if (buffer.includes('___REVIEWER_ACTION___:')) {
                    const parts = buffer.split('___REVIEWER_ACTION___:');
                    appendLog(parts[0]); // 印出標籤前面的正常日誌

                    try {
                        // 嘗試解析隱藏的 JSON
                        const jsonStr = parts[1].split('\n')[0];
                        const reviewData = JSON.parse(jsonStr);
                        showReviewerModal(reviewData);
                    } catch (e) {
                        console.error("Failed to parse Reviewer JSON");
                    }
                    buffer = parts[1].substring(parts[1].indexOf('\n') + 1); // 清理緩衝區
                } else {
                    // 實時印出日誌
                    let lines = buffer.split('\n');
                    buffer = lines.pop(); // 保留最後一行未完成的字串
                    if (lines.length > 0) appendLog(lines.join('\n') + '\n');
                }
            }
            if (buffer.length > 0) appendLog(buffer);
        }

        // 啟動主流程
        async function generateProject() {
            const description = document.getElementById('description').value;
            const apiKey = document.getElementById('apiKey').value;

            if (!description) return alert('Please enter a project description.');

            generateBtn.disabled = true;
            generateBtn.classList.add('pulse');
            terminal.innerHTML = '';
            appendLog("🚀 Initializing CodeCraft Agentic Pipeline...\n");

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        description,
                        outputDir: document.getElementById('outputDir').value,
                        apiKey: apiKey,
                        lang: document.getElementById('lang').value,
                        install: document.getElementById('install').checked,
                        test: document.getElementById('test').checked,
                        force: document.getElementById('force').checked
                    })
                });

                await readStream(response);

                // 解鎖 AI 修改功能
                patchMsg.disabled = false;
                patchBtn.disabled = false;

            } catch (error) {
                appendLog(`\n[31m❌ Connection Error: ${error.message}[0m`);
            } finally {
                generateBtn.disabled = false;
                generateBtn.classList.remove('pulse');
            }
        }

        // AI 局部修改補丁
        async function sendPatch() {
            const message = patchMsg.value;
            const apiKey = document.getElementById('apiKey').value;
            const projectDir = document.getElementById('outputDir').value;

            if (!message || !projectDir) return alert('Please specify a project directory and a message.');

            patchBtn.disabled = true;
            patchMsg.value = '';
            appendLog(`\n\n[35m✨ Sending Patch Request: "${message}"...[0m\n`);

            try {
                const response = await fetch('/api/modify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ projectDir, message, apiKey })
                });
                await readStream(response);
            } catch (error) {
                appendLog(`\n[31m❌ Patch Failed: ${error.message}[0m`);
            } finally {
                patchBtn.disabled = false;
            }
        }

        // 顯示 QA 決策視窗
        function showReviewerModal(data) {
            document.getElementById('reviewerMsg').innerText = data.message || "An issue needs your decision.";
            const optionsDiv = document.getElementById('reviewerOptions');
            optionsDiv.innerHTML = '';

            if (data.options && Array.isArray(data.options)) {
                data.options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = `${String.fromCharCode(65 + idx)}. ${opt}`;
                    btn.onclick = () => {
                        appendLog(`\n[36m🧑‍💻 User selected option: ${opt}[0m\n`);
                        patchMsg.value = `I encountered an error. Please apply this solution: ${opt}`;
                        closeModal();
                        sendPatch(); // 直接呼叫補丁邏輯來修復
                    };
                    optionsDiv.appendChild(btn);
                });
            }
            document.getElementById('reviewerModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('reviewerModal').style.display = 'none';
        }
    </script>
</body>

</html>
